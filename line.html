<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Page</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
    width: 100%;
}
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

/* Top buttons */
#top-buttons {
    position: fixed;
    top: 15px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
}
button, input[type="file"] {
    padding: 10px 20px;
    font-size: 18px;
    background-color: black;
    color: white;
    border: 2px solid white;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
}
button:hover, input[type="file"]:hover { background-color: green; }

/* File title */
#fileNameTitle { margin-top: 70px; font-size: 18px; }

/* Output */
#output { width: 90%; max-width: 800px; margin-top: 20px; }
#lineContainer {
    position: relative;
    width: 100%;
    border-radius: 10px;
    background-color: black;
    overflow: hidden;
    height: auto;
}
.border-left, .border-right {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 5px;
    background-color: transparent;
}
.border-left { left: 0; }
.border-right { right: 0; }
.lineContent { padding: 20px; color: white; }

/* Controls */
#controls { display: none; flex-direction: column; align-items: center; margin-top: 40px; gap: 30px; }
#nextButton { width: calc(100% - 40px); max-width: 800px; height: 130px; border-radius: 20px; font-size: 60px; }
.sub-buttons { display: flex; justify-content: center; gap: 30px; }
.sub-buttons button { font-size: 18px; padding: 10px 20px; border-radius: 10px; }

/* Settings */
#settingsModal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background-color: black;
    border: 2px solid white;
    border-radius: 10px;
    padding: 30px;
    z-index: 20;
    width: 320px;
    text-align: center;
}
#settingsModal h2 { margin-top:0; }
#settingsModal label { display: block; margin-top: 15px; font-size: 16px; }
#closeSettings { position: absolute; top: 8px; right: 10px; font-size: 22px; background:none; border:none; color:white; cursor:pointer; }
.slider-container { display: flex; justify-content:center; align-items:center; gap:40px; margin-top:20px; }
.slider-wrapper { display: flex; flex-direction: column; align-items: center; }
input[type="range"] { writing-mode: bt-lr; width: 6px; height: 120px; background: white; accent-color:white; cursor:pointer; }
input[type="range"]::-webkit-slider-thumb { background:white; }
input[type="range"]::-moz-range-thumb { background:white; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<!-- Top buttons -->
<div id="top-buttons">
    <button id="clearButton">X</button>
    <button id="processButton" style="display:none;">Roles</button>
    <button id="resetButton"><<</button>
    <button id="settingsButton">?</button>
</div>

<!-- Settings modal -->
<div id="settingsModal">
    <button id="closeSettings">✖</button>
    <h2>Settings</h2>
    <div class="slider-container">
        <div class="slider-wrapper">
            <label>Vol</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05">
            <span id="volumeValue"></span>
        </div>
        <div class="slider-wrapper">
            <label>Speed</label>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1">
            <span id="speedValue"></span>
        </div>
    </div>
</div>

<h2 id="fileNameTitle"></h2>
<input type="file" id="fileInput" accept=".pdf">

<!-- Output -->
<div id="output">
    <div id="lineContainer">
        <div class="border-left"></div>
        <div class="border-right"></div>
        <div class="lineContent"></div>
    </div>
</div>

<!-- Controls -->
<div id="controls">
    <button id="nextButton">&gt;</button>
    <div class="sub-buttons">
        <button id="backButton">Back</button>
        <button id="skipAheadButton">Skip Ahead</button>
        <button id="muteButton">Mute</button>
    </div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const processButton=document.getElementById('processButton');
const resetButton=document.getElementById('resetButton');
const clearButton=document.getElementById('clearButton');
const lineContainer=document.getElementById('lineContainer');
const controls=document.getElementById('controls');
const nextButton=document.getElementById('nextButton');
const backButton=document.getElementById('backButton');
const skipAheadButton=document.getElementById('skipAheadButton');
const muteButton=document.getElementById('muteButton');
const fileNameTitle=document.getElementById('fileNameTitle');
const settingsButton=document.getElementById('settingsButton');
const settingsModal=document.getElementById('settingsModal');
const closeSettings=document.getElementById('closeSettings');
const volumeSlider=document.getElementById('volumeSlider');
const speedSlider=document.getElementById('speedSlider');
const volumeValue=document.getElementById('volumeValue');
const speedValue=document.getElementById('speedValue');

let characterChoices={}, lines=[], currentLineIndex=-1, isMuted=false, pdfLoaded=false;
let buttonFlashTimers=new WeakMap();
let settings={volume:parseFloat(localStorage.getItem('volume'))||0.8, speed:parseFloat(localStorage.getItem('speed'))||1.0};

volumeSlider.value=settings.volume;
speedSlider.value=settings.speed;
volumeValue.textContent=settings.volume.toFixed(2);
speedValue.textContent=settings.speed.toFixed(1);

volumeSlider.addEventListener('input',()=>{
    settings.volume=parseFloat(volumeSlider.value);
    volumeValue.textContent=settings.volume.toFixed(2);
    localStorage.setItem('volume',settings.volume);
});
speedSlider.addEventListener('input',()=>{
    settings.speed=parseFloat(speedSlider.value);
    speedValue.textContent=settings.speed.toFixed(1);
    localStorage.setItem('speed',settings.speed);
});

function flashButton(btn){
    if(buttonFlashTimers.has(btn)){clearTimeout(buttonFlashTimers.get(btn));buttonFlashTimers.delete(btn);}
    btn.style.transition='background-color 0.15s ease';
    btn.style.backgroundColor='green';btn.style.color='white';
    const timer=setTimeout(()=>{if(btn===muteButton&&isMuted)return;btn.style.backgroundColor='black';btn.style.color='white';buttonFlashTimers.delete(btn);},500);
    buttonFlashTimers.set(btn,timer);
}

fileInput.addEventListener('change',handleFileChange);
processButton.addEventListener('click',handleProcessScript);
nextButton.addEventListener('click',()=>{flashButton(nextButton);playClickChord();navigateLine(1);});
backButton.addEventListener('click',()=>{flashButton(backButton);navigateLine(-1);});
skipAheadButton.addEventListener('click',()=>{flashButton(skipAheadButton);skipAhead();});
muteButton.addEventListener('click',()=>{flashButton(muteButton);toggleMute();});
resetButton.addEventListener('click',()=>{flashButton(resetButton);resetScene();});
clearButton.addEventListener('click',()=>{flashButton(clearButton);clearPDF();});
settingsButton.addEventListener('click',()=>settingsModal.style.display='block');
closeSettings.addEventListener('click',()=>settingsModal.style.display='none');

speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();};

function toggleMute(){isMuted=!isMuted;muteButton.textContent=isMuted?"Unmute":"Mute";muteButton.style.backgroundColor=isMuted?"green":"black";muteButton.style.color="white";if(isMuted)speechSynthesis.cancel();}

function handleFileChange(){const file=fileInput.files[0];if(file){pdfLoaded=true;fileInput.style.display="none";fileNameTitle.textContent=stripExtension(file.name);processButton.style.display="inline-block";}}
function stripExtension(filename){return filename.replace(/\.[^/.]+$/,"");}

function handleProcessScript(){
    const file=fileInput.files[0];if(!file)return alert("Please upload a script.");
    const reader=new FileReader();
    reader.onload=(e)=>{
        const typedArray=new Uint8Array(e.target.result);
        pdfjsLib.getDocument(typedArray).promise.then(pdf=>
            Promise.all(Array.from({length:pdf.numPages},(_,i)=>pdf.getPage(i+1).then(p=>p.getTextContent())))
        ).then(arr=>{
            const fullText=arr.flatMap(tc=>tc.items.map(i=>i.str)).join(' ');
            identifyCharacters(fullText);
        });
    };
    reader.readAsArrayBuffer(file);
}

function identifyCharacters(scriptText){
    const regex=/([A-Z]{2,})[,.]\s*(.+?)(?=[A-Z]{2,}[,.]\s*|$)/gs;
    const chars=new Set();let match;
    while((match=regex.exec(scriptText))!==null) chars.add(match[1].trim());
    if(chars.size>0) displayCharacterSelection([...chars],scriptText);
    else alert("No characters found.");
}

function displayCharacterSelection(chars,scriptText){
    lineContainer.querySelector('.lineContent').innerHTML='<h2>Select Voice Type for Each Character</h2>';
    const form=document.createElement('form');
    chars.forEach(ch=>{
        const div=document.createElement('div');
        div.style.marginBottom='10px';
        div.innerHTML=`<label>${ch}:</label>
        <select name="${ch}" style="margin-left:10px;background:black;color:white;border:2px solid white;border-radius:5px;padding:5px;">
            <option value="masc">Masc</option>
            <option value="fem">Fem</option>
            <option value="mute">Mute</option>
            <option value="skip">Skip</option>
        </select>`;
        form.appendChild(div);
    });
    const done=document.createElement('button');
    done.textContent="Done";
    done.style="background:black;color:white;border:2px solid white;border-radius:5px;padding:10px 20px;";
    done.addEventListener('click',e=>{
        e.preventDefault();
        new FormData(form).forEach((v,k)=>characterChoices[k]=v);
        processScriptWithSelections(scriptText);
    });
    form.appendChild(done);
    lineContainer.querySelector('.lineContent').appendChild(form);
}

function processScriptWithSelections(scriptText){
    const regex=/([A-Z]{2,})[,.]\s*(.+?)(?=[A-Z]{2,}[,.]\s*|$)/gs;
    lines=[];let match;
    while((match=regex.exec(scriptText))!==null){
        const speaker=match[1].trim();
        const line=match[2].trim();
        const choice=characterChoices[speaker];
        lines.push({speaker,line,choice});
    }
    controls.style.display='flex';
    navigateLine(0);
}

function navigateLine(direction){
    currentLineIndex+=direction;
    if(currentLineIndex<0) currentLineIndex=0;
    if(currentLineIndex>=lines.length){
        controls.style.display='none';
        lineContainer.querySelector('.lineContent').innerHTML="<h2>No more lines to read!</h2>";
        lineContainer.style.border='3px solid white';
        lineContainer.querySelector('.border-left').style.backgroundColor='transparent';
        lineContainer.querySelector('.border-right').style.backgroundColor='transparent';
        return;
    }
    const {speaker,line,choice}=lines[currentLineIndex];
    const clean=line.replace(/\(.*?\)/g,'').trim();
    const container=lineContainer;
    const content=container.querySelector('.lineContent');
    const left=container.querySelector('.border-left');
    const right=container.querySelector('.border-right');
    content.innerHTML=`<h2>${speaker}: ${clean}</h2>`;
    container.style.border='3px solid white';
    left.style.backgroundColor='transparent';
    right.style.backgroundColor='transparent';
    const prev=lines[currentLineIndex-1]?.choice;
    const next=lines[currentLineIndex+1]?.choice;

    if(choice==='mute'||choice==='skip'){ container.style.border='3px solid green'; }
    else if(next==='mute'||next==='skip'){ container.style.border='3px solid yellow'; }
    if(prev && (prev==='mute'||prev==='skip') && choice==='mute'){
        container.style.border='none';
        left.style.backgroundColor='green';
        right.style.backgroundColor='yellow';
    }

    if(!isMuted && choice!=='mute' && choice!=='skip') speak(line);
    else speechSynthesis.cancel();
}

function resetScene(){if(lines.length===0)return;currentLineIndex=-1;navigateLine(0);}
function clearPDF(){pdfLoaded=false;fileInput.value="";fileInput.style.display="inline-block";fileNameTitle.textContent="";lineContainer.querySelector('.lineContent').innerHTML="";controls.style.display="none";processButton.style.display="none";speechSynthesis.cancel();lineContainer.style.border='3px solid white';lineContainer.querySelector('.border-left').style.backgroundColor='transparent';lineContainer.querySelector('.border-right').style.backgroundColor='transparent';}
function skipAhead(){let next=-1;for(let i=currentLineIndex+1;i<lines.length;i++) if(lines[i].choice==='mute'||lines[i].choice==='skip'){next=i;break;} if(next===-1){currentLineIndex=lines.length;controls.style.display='none';lineContainer.querySelector('.lineContent').innerHTML="<h2>No more lines to read!</h2>";return;} currentLineIndex=next-1;navigateLine(0);}
function speak(text){const u=new SpeechSynthesisUtterance(text); u.volume=Math.min(settings.volume*1.5,1.0); u.rate=settings.speed; speechSynthesis.cancel(); speechSynthesis.speak(u);}
function playClickChord(){const a=new(window.AudioContext||window.webkitAudioContext)();const now=a.currentTime;[261.63,329.63,392.00].forEach(f=>{const o=a.createOscillator();const g=a.createGain();o.type="sine";o.frequency.setValueAtTime(f,now);g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.4);o.connect(g).connect(a.destination);o.start(now);o.stop(now+0.4);});}
</script>
</body>
</html>
