<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Script Page</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
    height: 100%;
    width: 100%;
}
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* Top button bar */
#top-buttons {
    position: fixed;
    top: 15px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
}

/* Buttons */
button, input[type="file"] {
    padding: 10px 20px;
    font-size: 18px;
    background-color: black;
    color: white;
    border: 2px solid white;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s, color 0.3s;
}
button:hover, input[type="file"]:hover {
    background-color: green;
}

/* Output box */
#output {
    white-space: pre-wrap;
    text-align: left;
    margin-top: 80px;
    background-color: black;
    border: 1px solid white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 800px;
    transition: border-color 0.3s ease;
}

/* Controls */
#controls {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
    gap: 30px;
}

#nextButton {
    width: calc(100% - 40px);
    max-width: 800px;
    height: 130px;
    border-radius: 20px;
    font-size: 60px;
}

.sub-buttons {
    display: flex;
    justify-content: center;
    gap: 30px;
}

/* Settings popup */
#settingsModal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: black;
    border: 2px solid white;
    border-radius: 10px;
    padding: 30px;
    z-index: 20;
    width: 320px;
    text-align: center;
}
#closeSettings {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}
.slider-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
}
.slider-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}
input[type="range"] {
    appearance: slider-vertical;
    writing-mode: bt-lr;
    width: 6px;
    height: 120px;
    background: white;
    accent-color: white;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<!-- Top button bar -->
<div id="top-buttons">
    <button id="clearButton">X</button>
    <button id="processButton" style="display:none;">Roles</button>
    <button id="resetButton">&lt;&lt;</button>
    <button id="autoButton">&gt;&gt;</button>
    <button id="settingsButton">?</button>
</div>

<!-- Settings Modal -->
<div id="settingsModal">
    <button id="closeSettings">✖</button>
    <h2>Settings</h2>
    <div class="slider-container">
        <div class="slider-wrapper">
            <label>Vol</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05">
            <span id="volumeValue"></span>
        </div>
        <div class="slider-wrapper">
            <label>Speed</label>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.1">
            <span id="speedValue"></span>
        </div>
    </div>
</div>

<h2 id="fileNameTitle"></h2>
<input type="file" id="fileInput" accept=".pdf">
<div id="output"></div>

<div id="controls">
    <button id="nextButton">&gt;</button>
    <div class="sub-buttons">
        <button id="backButton">Back</button>
        <button id="skipAheadButton">Skip Ahead</button>
        <button id="muteButton">Mute</button>
    </div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const processButton=document.getElementById('processButton');
const resetButton=document.getElementById('resetButton');
const clearButton=document.getElementById('clearButton');
const outputDiv=document.getElementById('output');
const controls=document.getElementById('controls');
const nextButton=document.getElementById('nextButton');
const backButton=document.getElementById('backButton');
const skipAheadButton=document.getElementById('skipAheadButton');
const muteButton=document.getElementById('muteButton');
const settingsButton=document.getElementById('settingsButton');
const settingsModal=document.getElementById('settingsModal');
const closeSettings=document.getElementById('closeSettings');
const volumeSlider=document.getElementById('volumeSlider');
const speedSlider=document.getElementById('speedSlider');
const volumeValue=document.getElementById('volumeValue');
const speedValue=document.getElementById('speedValue');
const autoButton=document.getElementById('autoButton');

let characterChoices={};
let lines=[];
let currentLineIndex=-1;
let isMuted=false;
let autoMode=false;
let autoTimer=null;
let settings={volume:0.8,speed:1.0};

volumeSlider.value=settings.volume;
speedSlider.value=settings.speed;
volumeValue.textContent=settings.volume.toFixed(2);
speedValue.textContent=settings.speed.toFixed(1);

autoButton.addEventListener('click',()=>{
    autoMode=!autoMode;
    autoButton.style.backgroundColor=autoMode?'green':'black';
    if(autoMode && currentLineIndex>=0) autoAdvance();
});

function autoAdvance(){
    if(currentLineIndex>=lines.length) return;
    const {choice,line}=lines[currentLineIndex];
    let baseTime=line.split(' ').length*250; // 250ms per word
    let waitTime=baseTime;
    const nextLine=lines[currentLineIndex+1];
    if(nextLine && (nextLine.choice==='skip'||nextLine.choice==='mute')) waitTime*=2;

    if(choice==='mute') waitTime=baseTime;
    if(nextLine && (nextLine.choice==='skip'||nextLine.choice==='mute'))
        outputDiv.style.borderColor='yellow';
    else outputDiv.style.borderColor='white';

    if(choice==='mute'||choice==='skip') {
        autoTimer=setTimeout(()=>navigateLine(1),waitTime);
    } else {
        const utter=new SpeechSynthesisUtterance(line);
        utter.rate=settings.speed;
        utter.volume=settings.volume;
        utter.onend=()=>{ if(autoMode) autoAdvanceNext(); };
        speechSynthesis.speak(utter);
    }
}
function autoAdvanceNext(){
    if(autoTimer) clearTimeout(autoTimer);
    navigateLine(1);
    if(autoMode) autoAdvance();
}

nextButton.addEventListener('click',()=>{navigateLine(1);});
backButton.addEventListener('click',()=>{navigateLine(-1);});

function navigateLine(direction){
    if(autoTimer) clearTimeout(autoTimer);
    currentLineIndex+=direction;
    while(currentLineIndex>=0 && currentLineIndex<lines.length && lines[currentLineIndex].choice==='skip')
        currentLineIndex+=direction;
    if(currentLineIndex<0||currentLineIndex>=lines.length){
        outputDiv.innerHTML="<h2>No more lines!</h2>";
        outputDiv.style.borderColor='white';
        return;
    }
    const {speaker,line,choice}=lines[currentLineIndex];
    outputDiv.innerHTML=`<h2>${speaker}: ${line}</h2>`;
    if(autoMode) autoAdvance();
}
</script>
</body>
</html>
