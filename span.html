<!DOCTYPE html>
<html>
<head>
<title>Spanish Oral Exam Practice</title>

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:#eee;
text-align:center;
padding:40px;
}

/* SETTINGS */

#settingsIcon{
position:absolute;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

#settingsPanel{
position:absolute;
top:60px;
right:20px;
background:#222;
padding:20px;
border-radius:10px;
display:none;
width:220px;
text-align:left;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.slider{
width:100%;
}

/* BUTTON LAYOUT */

#controlArea{
margin-top:120px;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
}

/* BIG QUESTION BUTTON */

#askButton{
width:140px;
height:140px;
border-radius:50%;
font-size:60px;
border:none;
cursor:pointer;
background:#444;
color:white;
}

/* LEFT REPEAT BUTTON */

.smallCircle{
width:70px;
height:70px;
border-radius:50%;
font-size:28px;
border:none;
cursor:pointer;
background:#333;
color:white;
}

/* RIGHT STACK */

#rightStack{
display:flex;
flex-direction:column;
gap:15px;
}

.stackButton{
width:80px;
height:55px;
font-size:22px;
border:none;
border-radius:8px;
cursor:pointer;
background:#333;
color:white;
}

/* TEXT */

#question{
font-size:28px;
margin-top:60px;
}

#answer{
margin-top:30px;
white-space:pre-line;
font-size:20px;
color:#8be9fd;
}

</style>
</head>

<body>

<div id="settingsIcon" onclick="toggleSettings()">⚙️</div>

<div id="settingsPanel">

<label>Volume</label>
<input type="range" id="volumeSlider" class="slider" min="0" max="1" step="0.05" value="1">

<label>Speed</label>
<input type="range" id="speedSlider" class="slider" min="0.25" max="1" step="0.05" value=".625">

<label>
<input type="checkbox" id="questionMute">
Mute Questions
</label>

<label>
<input type="checkbox" id="answerMute">
Mute Answers
</label>

</div>

<h1>Spanish Oral Exam Practice</h1>

<input type="file" id="pdfUpload" accept=".pdf">

<div id="controlArea">

<button class="smallCircle" onclick="repeatQuestion()">↻</button>

<button id="askButton" onclick="askQuestion()">?</button>

<div id="rightStack">

<button class="stackButton" onclick="showNextLine()">></button>

<button class="stackButton" onclick="showFullAnswer()">>></button>

</div>

</div>

<div id="question"></div>
<div id="answer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>

let qaPairs = [];
let current = null;
let answerLines = [];
let lineIndex = 0;

/* SETTINGS MENU */

function toggleSettings(){

let panel = document.getElementById("settingsPanel");

panel.style.display =
panel.style.display === "block"
? "none"
: "block";

}

/* SPEECH */

function speakSpanish(text){

speechSynthesis.cancel();

const utter = new SpeechSynthesisUtterance(text);

let voices = speechSynthesis.getVoices();
let spanish = voices.find(v => v.lang.startsWith("es"));

if(spanish) utter.voice = spanish;

utter.lang = "es-ES";

utter.volume =
document.getElementById("volumeSlider").value;

utter.rate =
document.getElementById("speedSlider").value;

setTimeout(()=>{
speechSynthesis.speak(utter);
},120);

}

/* PDF LOAD */

document.getElementById('pdfUpload').addEventListener('change', async function(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = async function(){

const typedarray = new Uint8Array(this.result);
const pdf = await pdfjsLib.getDocument(typedarray).promise;

let fullText = "";

for(let i=1;i<=pdf.numPages;i++){

let page = await pdf.getPage(i);
let txt = await page.getTextContent();

txt.items.forEach(item=>{
fullText += item.str + "\n";
});

}

parseText(fullText);

};

reader.readAsArrayBuffer(file);

});

/* PARSE */

function parseText(text){

qaPairs = [];

let sections = text.split("QUESTION:");

sections.forEach(section=>{

if(section.trim()=="") return;

let parts = section.split("ANSWER:");
if(parts.length<2) return;

let question = parts[0].trim();
let answer = parts[1].trim();

qaPairs.push({question,answer});

});

alert("Loaded " + qaPairs.length + " questions!");

}

/* ASK QUESTION */

function askQuestion(){

if(qaPairs.length===0){
alert("Upload your PDF first!");
return;
}

let rand = Math.floor(Math.random()*qaPairs.length);
current = qaPairs[rand];

document.getElementById("question").innerText =
current.question;

document.getElementById("answer").innerText = "";

answerLines =
current.answer.split("\n").filter(l => l.trim() !== "");

lineIndex = 0;

if(!document.getElementById("questionMute").checked){
speakSpanish(current.question);
}

}

/* REPEAT QUESTION */

function repeatQuestion(){

if(!current) return;

if(!document.getElementById("questionMute").checked){
speakSpanish(current.question);
}

}

/* SHOW FULL ANSWER */

function showFullAnswer(){

if(!current) return;

document.getElementById("answer").innerText =
current.answer;

}

/* NEXT LINE */

function showNextLine(){

if(!current) return;

if(lineIndex < answerLines.length){

let line = answerLines[lineIndex];

document.getElementById("answer").innerText +=
line + "\n";

lineIndex++;

if(!document.getElementById("answerMute").checked){
speakSpanish(line);
}

}

}

</script>

</body>
</html>
