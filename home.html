<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Home</title>
<style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    /* Bomb button at bottom, brighter red, black border */
    #bombBtn {
        position: absolute;
        left:50%; bottom:40px;
        transform: translateX(-50%);
        width:160px; height:160px;
        border-radius:50%;
        background:#ff1a1a;
        border:4px solid black;
        cursor:pointer;
        z-index:10;
    }

    /* Mute button top right */
    #muteBtn {
        position:absolute; top:10px; right:10px;
        background:gray; border:none; padding:10px 14px;
        color:white; font-size:16px; cursor:pointer;
        border-radius:6px; z-index:10;
    }

    /* Flash effect */
    #flash {
        position:absolute; top:0; left:0; width:100%; height:100%;
        background:lightgray; opacity:0; pointer-events:none; z-index:9;
    }

    /* House counter top left */
    #ui {
        position: absolute; top:10px; left:10px;
        color:white; font-size:20px; z-index:10;
    }
</style>
</head>
<body>

<div id="ui">
    Homes: <span id="count">0</span>
</div>
<button id="bombBtn"></button>
<button id="muteBtn">Mute</button>
<div id="flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ---------- Preferences ----------
let housesBombed = parseInt(localStorage.getItem('housesBombed')) || 0;
document.getElementById('count').innerText = housesBombed;

let muted = localStorage.getItem('muted') === 'true';
const muteBtn = document.getElementById('muteBtn');
muteBtn.innerText = muted ? 'Unmute' : 'Mute';

// ---------- Audio ----------
const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
let gainNode = AudioCtx.createGain();
gainNode.connect(AudioCtx.destination);
gainNode.gain.value = muted ? 0 : 0.15;

// ---------- Chords ----------
const scale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
function playChord(frequencies, duration=1500) {
    const now = AudioCtx.currentTime;
    frequencies.forEach(freq => {
        const osc = AudioCtx.createOscillator();
        osc.type = 'square';
        const oscGain = AudioCtx.createGain();
        oscGain.gain.setValueAtTime(0, now);
        osc.connect(oscGain).connect(gainNode);
        osc.start(now);
        oscGain.gain.linearRampToValueAtTime(0.12, now + 0.05);
        oscGain.gain.linearRampToValueAtTime(0, now + duration/1000);
        osc.frequency.setValueAtTime(freq, now);
        osc.stop(now + duration/1000 + 0.05);
    });
}

function playMelancholyChords() {
    const chordPatterns = [[0,2,4],[1,3,5],[0,3,5],[2,4,6]];
    function nextChord() {
        const pattern = chordPatterns[Math.floor(Math.random()*chordPatterns.length)];
        const freqs = pattern.map(i => scale[i % scale.length]);
        playChord(freqs, 1800 + Math.random()*400);
        setTimeout(nextChord, 1800 + Math.random()*400);
    }
    nextChord();
}
playMelancholyChords();

function playRandomBeat() {
    const tempo = 90 + Math.random()*20;
    const interval = (60/tempo)*1000;
    function hit() {
        const osc = AudioCtx.createOscillator();
        const gain = AudioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(60 + Math.random()*20, AudioCtx.currentTime);
        gain.gain.setValueAtTime(0.05 + Math.random()*0.05, AudioCtx.currentTime);
        osc.connect(gain).connect(gainNode);
        osc.start();
        osc.stop(AudioCtx.currentTime+0.1);
        setTimeout(hit, interval + Math.random()*100);
    }
    hit();
}
playRandomBeat();

// ---------- Bomb sounds ----------
function playBombSound() {
    const osc = AudioCtx.createOscillator();
    const gain = AudioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(80, AudioCtx.currentTime);
    gain.gain.setValueAtTime(0.2, AudioCtx.currentTime);
    osc.connect(gain).connect(gainNode);
    gain.connect(gainNode);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime+0.3);
    osc.stop(AudioCtx.currentTime+0.3);
}

// ---------- Explosion sounds with scream ----------
function playExplosionSounds() {
    // Crash
    const crash = AudioCtx.createOscillator();
    const crashGain = AudioCtx.createGain();
    crash.type = 'triangle';
    crash.frequency.setValueAtTime(60, AudioCtx.currentTime);
    crashGain.gain.setValueAtTime(0.2, AudioCtx.currentTime);
    crash.connect(crashGain).connect(gainNode);
    crashGain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime+0.5);
    crash.start(); crash.stop(AudioCtx.currentTime+0.5);

    // Scream
    const scream = AudioCtx.createOscillator();
    const screamGain = AudioCtx.createGain();
    scream.type = 'square';
    scream.frequency.setValueAtTime(1200 + Math.random()*400, AudioCtx.currentTime);
    screamGain.gain.setValueAtTime(0.15, AudioCtx.currentTime);
    scream.connect(screamGain).connect(gainNode);
    screamGain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime+0.2);
    scream.start(); scream.stop(AudioCtx.currentTime+0.2);
}

// ---------- Flash ----------
const flashDiv = document.getElementById('flash');
function triggerFlash() {
    flashDiv.style.opacity = 0.3;
    setTimeout(()=>flashDiv.style.opacity=0, 80);
}

// ---------- Scene ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 1000);
camera.position.set(0,2.2,7);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,1.1));
const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(3,5,2);
scene.add(dirLight);

// ---------- Starfield (fills screen, slower) ----------
const starCount = 500;
const stars = new THREE.Group();
const starArea = 25;
for(let i=0;i<starCount;i++){
    const starGeom = new THREE.SphereGeometry(0.03,4,4);
    const starMat = new THREE.MeshBasicMaterial({color:0xffffff});
    const star = new THREE.Mesh(starGeom, starMat);
    star.position.set(
        (Math.random()-0.5)*starArea,
        (Math.random()-0.5)*starArea + 2,
        -10 - Math.random()*5
    );
    stars.add(star);
}
scene.add(stars);

// ---------- House ----------
function makeHouse(color=0xffffff) {
    const group = new THREE.Group();
    const bodyGeom = new THREE.BoxGeometry(2,1.2,2);
    const bodyMat = new THREE.MeshStandardMaterial({color});
    const body = new THREE.Mesh(bodyGeom,bodyMat);
    body.position.y = 0.6;
    group.add(body);

    const roofGeom = new THREE.BufferGeometry();
    const baseY = 1.21, peakY = 2.01;
    const vertices = new Float32Array([
        -1,baseY,1,1,baseY,1,0,peakY,1,
        -1,baseY,-1,1,baseY,-1,0,peakY,-1,
        -1,baseY,1,-1,baseY,-1,0,peakY,1,
        -1,baseY,-1,0,peakY,-1,0,peakY,1,
        1,baseY,1,1,baseY,-1,0,peakY,1,
        1,baseY,-1,0,peakY,-1,0,peakY,1
    ]);
    roofGeom.setAttribute('position', new THREE.BufferAttribute(vertices,3));
    roofGeom.computeVertexNormals();
    const roofMat = new THREE.MeshStandardMaterial({color:(color&0xffffff)^0x202020, side:THREE.DoubleSide, polygonOffset:true, polygonOffsetFactor:1, polygonOffsetUnits:1});
    const roof = new THREE.Mesh(roofGeom, roofMat);
    roof.scale.set(1.01,1,1.01);
    group.add(roof);
    return group;
}

let house = makeHouse(0x3399ff);
house.position.y = 4.5;
scene.add(house);

// ---------- Explosion state ----------
let bomb=null, explosionPieces=[], exploding=false, respawnTimer=0;

// ---------- Bomb ----------
function dropBomb() {
    if(bomb || exploding) return;
    playBombSound();
    const bombGeom = new THREE.SphereGeometry(0.18,16,16);
    const bombMat = new THREE.MeshStandardMaterial({color:0x222222, metalness:0.4, roughness:0.6});
    bomb = new THREE.Mesh(bombGeom,bombMat);
    bomb.position.set(0,6,0);
    scene.add(bomb);
}
document.getElementById('bombBtn').onclick = dropBomb;

function explodeHouse() {
    explosionPieces=[];
    triggerFlash();
    playExplosionSounds();

    house.traverse(child=>{
        if(child.isMesh){
            const geom = child.geometry.clone();
            const mat = new THREE.MeshStandardMaterial({color:child.material.color.clone(),side:THREE.DoubleSide});
            const piece = new THREE.Mesh(geom,mat);
            child.updateWorldMatrix(true,false);
            const worldPos = new THREE.Vector3();
            const worldQuat = new THREE.Quaternion();
            const worldScale = new THREE.Vector3();
            child.matrixWorld.decompose(worldPos,worldQuat,worldScale);
            piece.position.copy(worldPos);
            piece.quaternion.copy(worldQuat);
            piece.scale.copy(worldScale);
            piece.userData.velocity = new THREE.Vector3((Math.random()-0.5)*4,Math.random()*4,(Math.random()-0.5)*4);
            piece.userData.angular = new THREE.Vector3((Math.random()-0.5)*0.3,(Math.random()-0.5)*0.3,(Math.random()-0.5)*0.3);
            scene.add(piece);
            explosionPieces.push(piece);
        }
    });
    scene.remove(house); house=null;
    exploding=true;
    housesBombed++;
    localStorage.setItem('housesBombed', housesBombed);
    document.getElementById('count').innerText = housesBombed;
    respawnTimer=140;
}

function respawnHouse(){
    const randColor = Math.floor(Math.random()*0xffffff);
    house = makeHouse(randColor);
    house.position.y = 4.5;
    scene.add(house);
    exploding=false;
}

// ---------- Animate ----------
let hoverAngle = 0;
function animate(){
    requestAnimationFrame(animate);

    if(house){
        house.rotation.y += 0.01;
        hoverAngle += 0.03;
        house.position.y = 2 + Math.sin(hoverAngle)*0.25;
    }

    if(bomb){
        bomb.position.y -= 0.14;
        if(bomb.position.y <= 1.18){scene.remove(bomb); bomb=null; explodeHouse();}
    }

    if(exploding){
        explosionPieces.forEach(p=>{
            p.position.addScaledVector(p.userData.velocity,0.06);
            p.userData.velocity.y -= 0.09;
            p.rotateX(p.userData.angular.x);
            p.rotateY(p.userData.angular.y);
            p.rotateZ(p.userData.angular.z);
            if(p.position.y<-6){p.material.transparent=true;p.material.opacity=Math.max(0,p.material.opacity-0.02);}
        });
        respawnTimer--;
        if(respawnTimer<=0){explosionPieces.forEach(p=>scene.remove(p));explosionPieces=[];respawnHouse();}
    }

    // Starfield move slower
    stars.children.forEach(star=>{
        star.position.x += 0.005;
        if(star.position.x > starArea/2) star.position.x = -starArea/2;
    });

    renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

// ---------- Mute ----------
document.getElementById('muteBtn').onclick = () => {
    muted = !muted;
    gainNode.gain.value = muted ? 0 : 0.15;
    localStorage.setItem('muted', muted);
    muteBtn.innerText = muted ? 'Unmute' : 'Mute';
};
</script>
</body>
</html>
